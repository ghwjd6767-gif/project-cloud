name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: 코드 가져오기
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Java 17 설치
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      # Step 3: gradlew 실행 권한
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Step 4: Gradle 캐시
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Step 5: JAR 빌드
      - name: Build JAR
        run: ./gradlew bootJar



      # Step 6: Docker Hub 로그인        ← ECR 로그인에서 변경
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 7: Docker 이미지 빌드 & Push  ← ECR 대신 Docker Hub로 변경
      - name: Build and push Docker image
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_URI=${{ secrets.DOCKERHUB_USERNAME }}/my-project-app

          docker build --platform linux/arm64 -t $IMAGE_URI:$SHORT_SHA .
          docker push $IMAGE_URI:$SHORT_SHA

          # latest 태그도 같이 push
          docker tag $IMAGE_URI:$SHORT_SHA $IMAGE_URI:latest
          docker push $IMAGE_URI:latest

          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

      # ── 여기서부터 CD ─────────────────────────────

      # Step 8: EC2에 SSH 접속해서 배포   ← ECR 로그인 부분만 제거
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Docker Hub에서 최신 이미지 Pull
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/my-project-app:latest

            # 기존 컨테이너 중지 & 삭제
            docker stop app || true
            docker rm app || true

            # 새 컨테이너 실행
            docker run -d \
              --name app \
              --restart always \
              -e SPRING_PROFILES_ACTIVE=prod \
              -p 8080:8080 \
              ${{ secrets.DOCKERHUB_USERNAME }}/my-project-app:latest

            echo "✅ 배포 완료!!"



